<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sakura Diary 🌸</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Itim&family=Quicksand:wght@400;500;600;700&family=Tangerine:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;}
  .polka-bg{
    background-image:radial-gradient(circle,rgba(240,180,210,.2) 1.2px,transparent 1.2px),radial-gradient(circle,rgba(180,200,240,.15) 1.2px,transparent 1.2px);
    background-size:20px 20px,30px 30px;background-position:0 0,10px 10px;
  }
  .win98{background:rgba(255,252,254,.88);border:2.5px solid rgba(240,190,220,.7);border-bottom-color:rgba(210,150,190,.8);border-right-color:rgba(210,150,190,.8);box-shadow:2px 2px 0 rgba(255,255,255,.9) inset,-1px -1px 0 rgba(200,140,180,.5) inset,4px 6px 24px rgba(210,160,200,.14);border-radius:6px;}
  .win98-title{background:linear-gradient(90deg,#f0a8c8,#c8a0e8,#a8c8f0,#a8f0d4);background-size:200% 100%;animation:titleShift 5s linear infinite;border-radius:3px 3px 0 0;padding:5px 10px;display:flex;align-items:center;gap:8px;}
  @keyframes titleShift{0%{background-position:0%}100%{background-position:200%}}
  .pixel-card{background:rgba(255,250,253,.85);border:3px solid rgba(245,185,215,.7);box-shadow:3px 3px 0 rgba(220,155,190,.35),inset 0 0 0 1px rgba(255,240,250,.9);border-radius:4px;transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative;overflow:hidden;}
  .pixel-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,#ffc8dc 0,#ffc8dc 6px,#d8c8f8 6px,#d8c8f8 12px,#c8e8ff 12px,#c8e8ff 18px,#c8f8e8 18px,#c8f8e8 24px);opacity:.8;}
  .pixel-card:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 rgba(220,155,190,.45);}
  .btn-main{background:linear-gradient(160deg,#f9b8d4,#d4a0f0);color:#fff;border:2.5px solid #c880c8;box-shadow:3px 3px 0 #a84090,inset 0 1px 0 rgba(255,255,255,.45);border-radius:4px;font-family:'Press Start 2P',monospace;font-size:8.5px;padding:10px 20px;cursor:pointer;letter-spacing:.05em;transition:transform .1s,box-shadow .1s;white-space:nowrap;}
  .btn-main:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #a84090,inset 0 1px 0 rgba(255,255,255,.45);}
  .btn-main:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #a84090;}
  .btn-sec{background:rgba(255,255,255,.8);color:#c870b0;border:2.5px solid rgba(230,175,215,.7);box-shadow:2px 2px 0 rgba(200,140,180,.35);border-radius:4px;font-family:'Press Start 2P',monospace;font-size:7.5px;padding:8px 14px;cursor:pointer;transition:transform .1s;white-space:nowrap;}
  .btn-sec:hover{transform:translate(-1px,-1px);background:rgba(255,230,245,.9);}
  .diary-title{width:100%;background:rgba(255,255,255,.82);border:2.5px solid rgba(235,180,215,.6);box-shadow:inset 2px 2px 0 rgba(255,220,240,.6),2px 2px 0 rgba(210,150,190,.3);border-radius:4px;font-family:'Itim',cursive;font-size:22px;color:#9040a0;padding:12px 18px;outline:none;transition:border-color .2s;}
  .diary-title:focus{border-color:rgba(200,130,190,.8);}
  .diary-title::placeholder{color:#e8c0d8;font-style:italic;}
  .write-title::placeholder{color:#ddc0e8;}
  .diary-area{width:100%;border:2.5px solid rgba(235,180,215,.55);box-shadow:inset 2px 2px 0 rgba(255,220,240,.5),2px 2px 0 rgba(210,150,190,.25);border-radius:4px;font-family:'Tangerine',cursive;font-size:36px;font-weight:700;color:#7040a0;line-height:1.68;padding:18px 28px 18px 44px;resize:none;outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:.06em;background-image:linear-gradient(rgba(255,180,220,.28) 0 0),repeating-linear-gradient(transparent,transparent 41px,rgba(210,170,240,.22) 41px,rgba(210,170,240,.22) 43px);background-size:3px 100%,100% 43px;background-position:36px 0,0 18px;background-repeat:no-repeat,repeat-y;background-color:rgba(255,255,255,.84);}
  .diary-area:focus{border-color:rgba(195,130,195,.75);box-shadow:inset 2px 2px 0 rgba(255,220,240,.5),2px 2px 0 rgba(195,130,195,.3),0 0 0 3px rgba(210,170,230,.15);}
  .diary-area::placeholder{color:#e0b8d8;font-family:'Tangerine',cursive;font-size:34px;font-weight:700;}
  .mood-pill{width:30px;height:30px;border-radius:50%;border:2px solid transparent;background:rgba(255,255,255,.65);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:1px 1px 0 rgba(210,160,200,.3);}
  .mood-pill:hover{transform:scale(1.2);background:rgba(255,220,240,.75);}
  .mood-pill.sel{border-color:#e880c8;background:rgba(255,200,235,.55);box-shadow:0 0 0 3px rgba(232,128,200,.2),2px 2px 0 rgba(210,140,190,.35);transform:scale(1.18);}
  .img-zone{border:3px dashed rgba(220,170,210,.6);border-radius:8px;background:rgba(255,240,250,.6);padding:18px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
  .img-zone:hover{border-color:rgba(200,130,180,.8);background:rgba(255,225,245,.75);}
  .img-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
  .img-thumb{position:relative;border:2.5px solid rgba(230,175,215,.7);border-radius:6px;overflow:hidden;box-shadow:2px 2px 0 rgba(200,140,180,.35);}
  .img-thumb img{display:block;width:100%;height:100%;object-fit:cover;}
  .img-del{position:absolute;top:3px;right:3px;background:rgba(240,100,130,.85);color:#fff;border:none;border-radius:3px;font-size:10px;cursor:pointer;padding:1px 5px;font-family:'Press Start 2P',monospace;line-height:1.4;}
  ::-webkit-scrollbar{width:7px;}
  ::-webkit-scrollbar-track{background:rgba(240,210,230,.25);}
  ::-webkit-scrollbar-thumb{background:linear-gradient(#f0a8c8,#c8a0e8);border-radius:10px;border:1px solid rgba(220,160,200,.5);}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:.8}100%{transform:translateY(110vh) rotate(400deg);opacity:.15}}
  @keyframes glitter{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.4)}}
  @keyframes sparkpop{0%{transform:scale(0) rotate(0);opacity:1}60%{transform:scale(1.6) rotate(180deg);opacity:1}100%{transform:scale(0) rotate(360deg);opacity:0}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes marquee{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PixelCat = () => (
  <svg width="52" height="48" viewBox="0 0 52 48" style={{imageRendering:"pixelated"}}>
    <rect x="4"  y="0"  width="8" height="8"  fill="#f9c0d8"/>
    <rect x="40" y="0"  width="8" height="8"  fill="#f9c0d8"/>
    <rect x="6"  y="2"  width="4" height="4"  fill="#ffeaf4"/>
    <rect x="42" y="2"  width="4" height="4"  fill="#ffeaf4"/>
    <rect x="8"  y="8"  width="36" height="30" fill="#fff5fa"/>
    <rect x="4"  y="12" width="44" height="22" fill="#fff5fa"/>
    <rect x="14" y="16" width="8"  height="8"  fill="#3d1a2e"/>
    <rect x="30" y="16" width="8"  height="8"  fill="#3d1a2e"/>
    <rect x="16" y="17" width="3"  height="3"  fill="#fff"/>
    <rect x="32" y="17" width="3"  height="3"  fill="#fff"/>
    <rect x="23" y="22" width="6"  height="5"  fill="#f4a0c0"/>
    <rect x="19" y="27" width="6"  height="3"  fill="#d46080"/>
    <rect x="27" y="27" width="6"  height="3"  fill="#d46080"/>
    <rect x="10" y="24" width="8"  height="4"  fill="#ffc8dc" style={{opacity:.4}}/>
    <rect x="34" y="24" width="8"  height="4"  fill="#ffc8dc" style={{opacity:.4}}/>
    <rect x="0"  y="22" width="12" height="2"  fill="#d4a0b8" style={{opacity:.5}}/>
    <rect x="40" y="22" width="12" height="2"  fill="#d4a0b8" style={{opacity:.5}}/>
    <rect x="0"  y="26" width="10" height="2"  fill="#d4a0b8" style={{opacity:.4}}/>
    <rect x="42" y="26" width="10" height="2"  fill="#d4a0b8" style={{opacity:.4}}/>
  </svg>
);
const PixelBow = ({c1="#e8607a",c2="#f9b8cc"}) => (
  <svg width="40" height="26" viewBox="0 0 40 26" style={{imageRendering:"pixelated"}}>
    <rect x="0"  y="6"  width="6" height="6"  fill={c1}/><rect x="6"  y="2"  width="6" height="8"  fill={c1}/>
    <rect x="6"  y="10" width="6" height="8"  fill={c2}/><rect x="12" y="0"  width="4" height="6"  fill={c1}/>
    <rect x="12" y="14" width="4" height="6"  fill={c1}/><rect x="16" y="8"  width="8" height="10" fill={c2}/>
    <rect x="18" y="10" width="4" height="6"  fill="#fff5fa"/><rect x="24" y="0"  width="4" height="6"  fill={c1}/>
    <rect x="24" y="14" width="4" height="6"  fill={c1}/><rect x="28" y="2"  width="6" height="8"  fill={c1}/>
    <rect x="28" y="10" width="6" height="8"  fill={c2}/><rect x="34" y="6"  width="6" height="6"  fill={c1}/>
  </svg>
);
const PixelHeart = ({c="#f06080"}) => (
  <svg width="20" height="18" viewBox="0 0 20 18" style={{imageRendering:"pixelated"}}>
    <rect x="2"  y="0" width="6" height="4"  fill={c}/><rect x="12" y="0" width="6" height="4"  fill={c}/>
    <rect x="0"  y="4" width="8" height="6"  fill={c}/><rect x="12" y="4" width="8" height="6"  fill={c}/>
    <rect x="0"  y="10" width="20" height="4" fill={c}/><rect x="2"  y="14" width="16" height="2" fill={c}/>
    <rect x="6"  y="16" width="8"  height="2" fill={c}/>
  </svg>
);
const PixelStar = ({c="#c8a0e8",s=1}) => (
  <svg width={16*s} height={16*s} viewBox="0 0 16 16" style={{imageRendering:"pixelated"}}>
    <rect x="6" y="0" width="4" height="4"  fill={c}/><rect x="4" y="4" width="8" height="2"  fill={c}/>
    <rect x="0" y="6" width="16" height="4" fill={c}/><rect x="4" y="10" width="8" height="2" fill={c}/>
    <rect x="3" y="12" width="4" height="2" fill={c}/><rect x="9" y="12" width="4" height="2" fill={c}/>
  </svg>
);
const PixelFlower = ({c="#f9b8d0",c2="#f9e0ec"}) => (
  <svg width="22" height="22" viewBox="0 0 22 22" style={{imageRendering:"pixelated"}}>
    <rect x="8"  y="0"  width="6" height="4"  fill={c}/><rect x="8"  y="18" width="6" height="4"  fill={c}/>
    <rect x="0"  y="8"  width="4" height="6"  fill={c}/><rect x="18" y="8"  width="4" height="6"  fill={c}/>
    <rect x="2"  y="2"  width="5" height="5"  fill={c2}/><rect x="15" y="2"  width="5" height="5"  fill={c2}/>
    <rect x="2"  y="15" width="5" height="5"  fill={c2}/><rect x="15" y="15" width="5" height="5"  fill={c2}/>
    <rect x="5"  y="5"  width="12" height="12" fill={c2}/><rect x="7"  y="7"  width="8" height="8"  fill="#f4c0d8"/>
    <rect x="9"  y="9"  width="4" height="4"  fill="#e07898"/>
  </svg>
);

const MOODS = ["🌸","💕","✨","🎀","🍓","🌙","🐱","💗","🌷","🍡","🫧","🍰","💌","🌈"];

function App() {
  const [view,      setView]      = useState("home");
  const [entries,   setEntries]   = useState([
    {id:1,date:"May 20",title:"A soft morning",mood:"🌸",content:"Woke up to the sound of rain tapping on the window. Made matcha and watched the petals fall outside... the whole world felt like it was wrapped in cotton candy clouds today ♡\n\nI want to keep this feeling forever and ever~",images:[]},
    {id:2,date:"May 18",title:"Starlight thoughts",mood:"✨",content:"Sometimes I think the sky keeps secrets just for me. Tonight felt like one of those nights where everything is quiet and full at the same time.\n\nCounted seven shooting stars and made seven wishes~",images:[]},
  ]);
  const [readEntry, setReadEntry] = useState(null);
  const [title,     setTitle]     = useState("");
  const [mood,      setMood]      = useState("🌸");
  const [content,   setContent]   = useState("");
  const [images,    setImages]    = useState([]);
  const [petals,    setPetals]    = useState([]);
  const [sparkles,  setSparkles]  = useState([]);
  const [glitters,  setGlitters]  = useState([]);
  const imgRef = useRef(null);

  useEffect(()=>{
    setPetals(Array.from({length:16},(_,i)=>({id:i,left:Math.random()*100,delay:Math.random()*12,dur:8+Math.random()*7,type:i%3})));
    setGlitters(Array.from({length:20},(_,i)=>({id:i,left:Math.random()*100,top:Math.random()*100,delay:Math.random()*4,size:2+Math.random()*3,hue:["#ffc8dc","#d4b8f0","#b8dff0","#b8f0d4","#f0e8b8","#f9c8e0"][i%6]})));
  },[]);

  const addSparkle = (e)=>{
    if(["TEXTAREA","INPUT","BUTTON","IMG","LABEL","SVG","RECT"].includes(e.target.tagName.toUpperCase())) return;
    const id=Date.now();
    setSparkles(s=>[...s,{id,x:e.clientX,y:e.clientY,em:["✨","💕","🌸","⭐","💫"][Math.floor(Math.random()*5)]}]);
    setTimeout(()=>setSparkles(s=>s.filter(sp=>sp.id!==id)),800);
  };

  const handleImages = (e)=>{
    Array.from(e.target.files).forEach(f=>{
      const r=new FileReader();
      r.onload=ev=>setImages(prev=>[...prev,{id:Date.now()+Math.random(),url:ev.target.result,name:f.name}]);
      r.readAsDataURL(f);
    });
    e.target.value="";
  };

  const save = ()=>{
    if(!content.trim()&&images.length===0) return;
    const d=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
    setEntries([{id:Date.now(),date:d,title:title||"dear diary...",mood,content,images:[...images]},...entries]);
    setTitle("");setContent("");setMood("🌸");setImages([]);setView("home");
  };

  const petalColors=[["#ffd0e8","#ffb0d0"],["#d8c8f8","#c0a8f0"],["#c8e8ff","#a8d4f8"]];

  return (
    <div onClick={addSparkle} style={{minHeight:"100vh",background:"linear-gradient(160deg,#fff8fc 0%,#fdf6ff 40%,#f6fcff 70%,#f8fff6 100%)",position:"relative",overflow:"hidden"}}>

      {glitters.map(g=>(
        <div key={g.id} style={{position:"fixed",left:`${g.left}%`,top:`${g.top}%`,width:g.size,height:g.size,borderRadius:"50%",background:g.hue,animation:`glitter ${2.5}s ${g.delay}s ease-in-out infinite`,pointerEvents:"none",zIndex:0}}/>
      ))}

      {petals.map(p=>{
        const [ca,cb]=petalColors[p.type];
        return <svg key={p.id} width="14" height="14" viewBox="0 0 14 14" style={{imageRendering:"pixelated",position:"fixed",left:`${p.left}%`,top:"-20px",animation:`fall ${p.dur}s ${p.delay}s linear infinite`,pointerEvents:"none",zIndex:1,opacity:.75}}>
          <rect x="3" y="0" width="8" height="4" fill={ca}/><rect x="1" y="4" width="12" height="5" fill={cb}/>
          <rect x="3" y="9" width="8" height="4" fill={ca}/><rect x="5" y="5" width="4" height="3" fill="#fff5fa"/>
        </svg>;
      })}

      {sparkles.map(sp=>(
        <div key={sp.id} style={{position:"fixed",left:sp.x-14,top:sp.y-14,animation:"sparkpop .8s ease forwards",zIndex:9999,pointerEvents:"none",fontSize:24}}>{sp.em}</div>
      ))}

      {/* marquee */}
      <div style={{background:"linear-gradient(90deg,#ffc8dc,#e4c8f8,#c8e0ff,#c8f8e8,#f8ecc8,#f8c8e8)",backgroundSize:"300% 100%",animation:"titleShift 6s linear infinite",padding:"5px 0",overflow:"hidden",position:"relative",zIndex:10,borderBottom:"3px solid rgba(220,160,210,.35)"}}>
        <div style={{animation:"marquee 22s linear infinite",whiteSpace:"nowrap",display:"inline-block",fontFamily:"'Press Start 2P',monospace",fontSize:"8px",color:"rgba(255,255,255,.95)",letterSpacing:".12em",textShadow:"0 1px 3px rgba(170,80,140,.35)"}}>
          &nbsp;&nbsp;🌸 SAKURA DIARY ✦ write your heart ✦ every petal is a memory 💕 ✦ kawaii days forever 🎀 ✦ u r so loved ✨ ✦ keep blooming 🌷 ✦ you are the main character 🍓 ✦&nbsp;&nbsp;
        </div>
      </div>

      {/* header */}
      <div className="polka-bg" style={{padding:"14px 20px",position:"relative",zIndex:10,background:"rgba(255,246,252,.82)",backdropFilter:"blur(16px)",borderBottom:"2.5px solid rgba(240,185,220,.4)"}}>
        <div style={{maxWidth:760,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{animation:"float 3s ease-in-out infinite"}}><PixelCat/></div>
            <div>
              <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:"13px",color:"#b050c8",textShadow:"2px 2px 0 #f9c8e8,-1px -1px 0 rgba(140,60,140,.2)",letterSpacing:".04em"}}>SAKURA DIARY</div>
              <div style={{display:"flex",gap:6,marginTop:5,alignItems:"center"}}>
                <PixelBow/><PixelBow c1="#8090e8" c2="#b8c8f8"/><PixelBow c1="#60c8a0" c2="#a8f0d0"/>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <button className="btn-sec" onClick={()=>{setView("home");setReadEntry(null);}}>📖 diary</button>
            <button className="btn-main" onClick={()=>setView("write")}>✏️ new entry</button>
          </div>
        </div>
      </div>

      {/* main */}
      <div style={{maxWidth:760,margin:"0 auto",padding:"24px 18px 90px",position:"relative",zIndex:5}}>

        {/* WRITE — full-screen notes style */}
        {view==="write"&&(
          <div style={{
            position:"fixed",inset:0,zIndex:100,
            background:"linear-gradient(160deg,#fff8fc 0%,#fdf6ff 50%,#f8fff6 100%)",
            display:"flex",flexDirection:"column",
          }}>
            {/* top bar */}
            <div style={{
              display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"12px 18px 10px",
              borderBottom:"1.5px solid rgba(240,185,220,.35)",
              background:"rgba(255,248,254,.92)",
              backdropFilter:"blur(16px)",
              flexShrink:0,
            }}>
              <button className="btn-sec" style={{padding:"7px 14px"}} onClick={()=>{setView("home");setImages([]);}}>← back</button>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {/* image upload button */}
                <label htmlFor="imgUp2" style={{cursor:"pointer"}}>
                  <input id="imgUp2" ref={imgRef} type="file" accept="image/*" multiple onChange={handleImages} style={{display:"none"}}/>
                  <div className="btn-sec" style={{padding:"7px 12px",fontSize:"13px"}}>🖼</div>
                </label>
                {/* mood picker inline */}
                <div style={{display:"flex",gap:3,overflowX:"auto",maxWidth:180}}>
                  {MOODS.map(m=>(
                    <button key={m} className={`mood-pill${mood===m?" sel":""}`} style={{width:28,height:28,fontSize:14,flexShrink:0}} onClick={()=>setMood(m)}>{m}</button>
                  ))}
                </div>
                <button className="btn-main" style={{padding:"7px 16px",fontSize:"8px"}} onClick={save}>🌸 save</button>
              </div>
            </div>

            {/* writing area — fills all remaining space */}
            <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",padding:"0 20px 20px"}}>

              {/* title */}
              <input
                className="write-title"
                placeholder="Title"
                value={title}
                onChange={e=>setTitle(e.target.value)}
                style={{
                  border:"none",outline:"none",
                  background:"transparent",
                  fontFamily:"'Itim',cursive",
                  fontSize:"42px",
                  fontWeight:"700",
                  color:"#9040a0",
                  padding:"30px 6px 18px",
                  width:"100%",
                  letterSpacing:".01em",
                  lineHeight:1.2,
                }}
              />

              {/* date + char count row */}
              <div style={{
                display:"flex",alignItems:"center",gap:10,
                padding:"0 6px 14px",
                fontFamily:"'Quicksand',sans-serif",
